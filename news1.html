<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>news1</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital@0;1&family=Noto+Serif+TC:wght@200..900&display=swap">
    <link rel="stylesheet" href="news1.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div id="interaction-layer">
      <div class="unlock-container">
        <div class="glow-line">
          <canvas id="bloodCanvas"></canvas>
        </div>
        <p class="instruction-text">劃開邊界，查看新聞報導</p>
      </div>
    </div>

    <div id="news-container">
      <article class="news-content">
        <h1>忠孝復興路口死亡車禍 砂石車內輪差釀悲劇</h1>
        <div class="date">發佈時間：2026年3月27日</div>
        
        <div class="photo-wrapper">
          <canvas id="pointCloud"></canvas>
          <div class="scanline"></div>
          <p class="caption">▲ 台北市一名年約42歲張姓婦人，遭砂石車輾過身亡。</p>
        </div>

        <p class="a">今（2）日上午8點多，台北市大安區發生死亡車禍...</p>
        <p class="b">42歲婦人當場連人帶車捲入車底，遭砂石車後輪輾過...</p>
        <p class="c">據了解，死者為單親家庭出身，家中僅剩年邁父親相依為命...</p>
        <p class="d">警方表示，經酒測後，砂石車駕駛酒測值為0...</p>
      </article>
    </div>

    <script type="module" src="./js/news1.js"></script>

    <script type="module">
        import { db, ref, onValue } from './js/firebase-init.js';

        $(document).ready(function() {
            const navRef = ref(db, "system/currentPage");
            onValue(navRef, (snapshot) => {
                const targetPage = snapshot.val();
                if (!targetPage || targetPage === "") return;

                let currentFile = window.location.pathname.split('/').pop();
                if (currentFile === "" || currentFile === "living-user-only") {
                    currentFile = "index.html";
                }
                
                const targetFile = targetPage + ".html";
                if (currentFile !== targetFile) {
                    window.location.href = targetFile;
                }
            });
        });
    </script>
</body>
</html>
