<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>entry</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital@0;1&family=Noto+Serif+TC:wght@200..900&display=swap">
    <link rel="stylesheet" href="index.css">
  </head>
  <body>

    <div class="stage">
      <div class="message " style="--delay: 0s; --dur: 5s">歡迎你來
      </div>
      <div class="message " style="--delay: 5s; --dur: 6s">你即將踏入生與死的交界
      </div>
      <div class="message " style="--delay: 11s; --dur: 6s">在這裡
你所看見的都是真實
      </div>
      <div class="message " style="--delay: 17s; --dur: 8s">握緊你的手機
那是唯一能讀取你還活著的數據
      </div>
      <div class="message " style="--delay: 25s; --dur: 6s">公園的使者已在裡面等候多時
      </div>
      <div class="message final-glitch" style="--delay: 31s; --dur: 999s"><span data-text="快進來">快進來</span>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script type="module">

        import { db, ref, onValue } from './js/firebase-init.js';
        $(document).ready(function() {
            const navRef = ref(db, "system/currentPage");

            onValue(navRef, (snapshot) => {
                const targetPage = snapshot.val();
                if (!targetPage) return;

                // 1. 抓取目前檔名，如果是空字串就補上 index.html
                let currentFile = window.location.pathname.split('/').pop();
                if (currentFile === "" || currentFile === "living-user-only") {
                    currentFile = "index.html";
                }
                
                // 2. 組合目標檔名
                const targetFile = targetPage + ".html";

                // 3. 只有在「目標」跟「現在」不一樣時才跳轉
                if (currentFile !== targetFile) {
                    console.log("切換場景至:", targetFile);
                    window.location.href = targetFile;
                }
            });
        });
    </script>
    <script>
    // 監聽整個頁面的觸碰起點
    window.addEventListener('touchstart', function(e) {
      // 取得第一根手指的水平位置
      const touchX = e.touches[0].pageX;

      // 如果觸碰點在螢幕左邊邊緣 50px 或右邊邊緣 50px 內
      if (touchX < 50 || touchX > window.innerWidth - 50) {
        // 阻止預設行為 (即防止觸發瀏覽器的導覽手勢)
        if (e.cancelable) {
          e.preventDefault();
        }
      }
    }, { passive: false }); // 關鍵：必須設為 false 才能成功攔截
  </script>   
  </body>
</html>
