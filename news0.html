<!DOCTYPE html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8">
    <title>news0</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:ital@0;1&family=Noto+Serif+TC:wght@200..900&display=swap">
    <link rel="stylesheet" href="news0.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  </head>
  <body>
    <!-- --- 互動解鎖層 ----->
    <div id="interaction-layer">
      <div class="unlock-container">
        <div class="glow-line"></div>
        <p class="instruction-text">劃開邊界，展開公園空間</p>
      </div>
    </div>
    <!-- --- 新增：將內容包起來的容器 ----->
    <div id="main-content">
      <!-- 中央新聞顯示區-->
      <div id="news-container">
        <div id="news-text"> </div>
      </div>
      <!-- 點雲畫布-->
      <canvas id="c"></canvas>
    </div>

    <script type="module" src="./news0.js"></script>
    <script type="module">
        import { db, ref, onValue } from 'https://afterpark-system.github.io/living-user-only/firebase-init.js';

        $(document).ready(function() {
            const navRef = ref(db, "system/currentPage");

            onValue(navRef, (snapshot) => {
                const targetPage = snapshot.val();
                if (!targetPage) return;

                // 1. 抓取目前檔名，如果是空字串就補上 index.html
                let currentFile = window.location.pathname.split('/').pop();
                if (currentFile === "" || currentFile === "living-user-only") {
                    currentFile = "index.html";
                }
                
                // 2. 組合目標檔名
                const targetFile = targetPage + ".html";

                // 3. 只有在「目標」跟「現在」不一樣時才跳轉
                if (currentFile !== targetFile) {
                    console.log("切換場景至:", targetFile);
                    window.location.href = targetFile;
                }
            });
        });
    </script>
  </body>
  
</html>
