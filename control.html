<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Control Panel</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body { background: black; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
    button { width: 220px; height: 60px; margin: 8px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; }
    .entry { background: #F2B263; }
    .news0 { background: #0099DD; }
    .home { background: #F28585; }
    .phone { background: #86A69D; }
    .news1 { background: #F0543E; }
    .dad { background: #666; }
  </style>
</head>
<body>
  <h1>System Control</h1>

  <div id="btn-group">
    <button class="entry" data-page="index">ENTRY</button><br>
    <button class="news0" data-page="news0">NEWS0</button><br>
    <button class="home" data-page="homepage">HOMEPAGE</button><br>
    <button class="phone" data-page="phonecall">PHONECALL</button><br>
    <button class="news1" data-page="news1">NEWS1</button><br>
    <button class="dad" data-page="fromdad">FROMDAD</button>
  </div>

  <script type="module">
    import { db, ref, set } from './firebase-init.js';

    $(document).ready(function() {
      $('button').on('click', function() {
        const pageName = $(this).data('page');
        set(ref(db, "system/currentPage"), pageName)
          .then(() => console.log("Sent:", pageName));
      });
    });
  </script>
</body>
</html>
