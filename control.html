<!DOCTYPE html>
<html lang="zh-TW">

<head>
<meta charset="UTF-8">
<title>Control Panel</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:80px;
}

h1{
    margin-bottom:40px;
}

button{

    width:200px;
    height:60px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    color: white

}

.entry{background:#F2B263;}
.news0{background:#0099DD;}
.home{background:#F28585;}
.phone{background:#86A69D;}
.news1{background:#F0543E;}
.dad{background:#666;}

</style>
</head>


<body>

<h1>System Control</h1>

<button class="entry" onclick="go('index-entry')">ENTRY</button>
<br>

<button class="news0" onclick="go('news0')">NEWS0</button>
<br>
<button class="home" onclick="go('homepage')">HOMEPAGE</button>

<br>

<button class="phone" onclick="go('phonecall')">PHONECALL</button>

<br>

<button class="news1" onclick="go('news1')">NEWS1</button>

<br>

<button class="dad" onclick="go('fromdad')">FROMDAD</button>


<script type="module">

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyB3AKaBDzQJHgiHA4q73GrBLnBefIvLU58",
authDomain: "afterpark-c9df6.firebaseapp.com",
databaseURL: "https://afterpark-c9df6-default-rtdb.firebaseio.com",
projectId: "afterpark-c9df6",
storageBucket: "afterpark-c9df6.firebasestorage.app",
messagingSenderId: "938532798856",
appId: "1:938532798856:web:20beb91409af7bb6b13a3d"

};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


window.go = function(page){

    set(ref(db,"system/currentPage"),page);

    console.log("Cue:",page);

}


</script>

</body>
</html>
